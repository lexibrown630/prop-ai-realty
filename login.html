 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PropAI Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #0D1B2A, #1B263B);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 14px;
  width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

h1 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: var(--gold);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h1>PropAI</h1>
  <p>Sign in to your account</p>

  <input type="email" id="email" placeholder="Enter your email" />
  <button onclick="login()">Send Magic Link</button>

  <div id="status"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

window.login = async () => {
  const email = document.getElementById("email").value;

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://prop-ai-realty.netlify.app/auth-callback.html"
    }
  });

  document.getElementById("status").innerText =
    error ? "❌ " + error.message : "✅ Check your email";
};
</script>

</body>
</html>
