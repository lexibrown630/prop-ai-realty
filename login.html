<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PropAI Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #0D1B2A, #1B263B);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 40px;
  border-radius: 14px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
}

button {
  margin-top: 16px;
  width: 100%;
  padding: 12px;
  background: #C9A84C;
  border: none;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="card">
  <h2>PropAI Login</h2>

  <input id="email" placeholder="Enter email" />
  <button id="login-btn">Send Magic Link</button>

  <div id="status"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// 🔥 LOGIN BUTTON
document.getElementById("login-btn").onclick = async () => {
  const email = document.getElementById("email").value;
  const status = document.getElementById("status");

  if (!email) {
    status.innerText = "Enter email";
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.origin + "/index.html"
    }
  });

  status.innerText = error ? error.message : "Check your email";
};

// 🔥 HANDLE MAGIC LINK RETURN
async function handleSession() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    localStorage.setItem("token", data.session.access_token);
    window.location.href = "/index.html";
  }
}

handleSession();
</script>

</body>
</html>
