<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: #0D1B2A;
  color: white;
  text-align: center;
}

h1 {
  font-family: 'Playfair Display', serif;
  margin-top: 40px;
}

.plans {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 50px;
  flex-wrap: wrap;
}

.card {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 12px;
  width: 260px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.price {
  font-size: 24px;
  margin: 10px 0;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border: none;
  background: #C9A84C;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="plans">

  <div class="card">
    <h2>Main</h2>
    <div class="price">$100/mo</div>
    <button onclick="checkout(this)">Start Subscription</button>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

async function checkout(button) {
  try {
    button.innerText = "Loading...";
    button.disabled = true;

    // ✅ Get current user
    const { data: { user } } = await supabase.auth.getUser();

    if (!user || !user.email) {
      alert("You must be logged in first.");
      window.location.href = "/login.html";
      return;
    }

    // ✅ Call Netlify function
    const res = await fetch("/.netlify/functions/createCheckout", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: user.email,
        userId: user.id
      })
    }); // ✅ THIS WAS MISSING

    const data = await res.json();

    console.log("CHECKOUT RESPONSE:", data);

    if (data.url) {
      window.location.href = data.url;
    } else {
      throw new Error(data.error || "No checkout URL returned");
    }

  } catch (err) {
    console.error("CHECKOUT ERROR:", err);
    alert(err.message || "Something went wrong");
    button.innerText = "Start Subscription";
    button.disabled = false;
  }
}

window.checkout = checkout;
</script>
</body>
</html>
