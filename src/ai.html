<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Follow-Up</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

nav {
  background: #0D1B2A;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 30px;
  max-width: 800px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 15px;
}

button {
  padding: 10px;
  background: #C9A84C;
  border: none;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
  margin-top: 10px;
}

.output {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 8px;
  white-space: pre-line;
}

.cta {
  background: #0D1B2A;
  color: white;
}
</style>
</head>

<body>

<nav>
  <div>PropAI</div>
  <button onclick="goBack()">Dashboard</button>
</nav>

<div class="container">
  <h1>AI Follow-Up Generator</h1>

  <!-- CLIENT INFO -->
  <label>Client Name</label>
  <input id="name" placeholder="John Smith">

  <label>Client Email</label>
  <input id="email" placeholder="john@email.com">

  <label>Client Phone (optional)</label>
  <input id="phone" placeholder="(555) 123-4567">

  <!-- PROPERTY INFO -->
  <label>Property Type</label>
  <select id="type">
    <option>House</option>
    <option>Condo</option>
    <option>Townhome</option>
    <option>Apartment</option>
  </select>

  <label>Location</label>
  <input id="location" placeholder="Miami, FL">

  <label>Key Features</label>
  <input id="features" placeholder="3 bed, 2 bath, pool">

  <label>Lead Situation</label>
  <textarea id="situation"></textarea>

  <button onclick="generate()">Generate Follow-Up</button>

  <div id="result" class="output" style="display:none;"></div>

  <button id="sendBtn" style="display:none;" onclick="sendEmail()">
    📧 Send to Client
  </button>

  <button id="bookBtn" class="cta" style="display:none;" onclick="goToCalendar()">
    📅 Book Showing
  </button>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// 🔒 AUTH
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  window.location.href = "/src/login.html";
}

// NAV
window.goBack = () => window.location.href = "/index.html";
window.goToCalendar = () => window.location.href = "/src/calendar.html";

// GENERATE AI
window.generate = async () => {
  const name = document.getElementById("name").value || "there";
  const email = document.getElementById("email").value;
  const type = document.getElementById("type").value;
  const location = document.getElementById("location").value;
  const features = document.getElementById("features").value;
  const situation = document.getElementById("situation").value;

  const message = `
Client: ${name}
Property: ${type}
Location: ${location}
Features: ${features}
Situation: ${situation}
`;

  const result = document.getElementById("result");
  const sendBtn = document.getElementById("sendBtn");
  const bookBtn = document.getElementById("bookBtn");

  result.style.display = "block";
  result.innerText = "Generating...";
  sendBtn.style.display = "none";
  bookBtn.style.display = "none";

  const res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    body: JSON.stringify({ message, type: "followup" }),
  });

  const data = await res.json();

  result.innerText = data.reply || "Error generating";

  sendBtn.style.display = "block";
  bookBtn.style.display = "block";
};

// SEND EMAIL
window.sendEmail = async () => {
  const email = document.getElementById("email").value;
  const message = document.getElementById("result").innerText;

  if (!email) {
    alert("Enter client email");
    return;
  }

  const res = await fetch("/.netlify/functions/sendEmail", {
    method: "POST",
    body: JSON.stringify({ email, message }),
  });

  const data = await res.json();

  if (data.success) {
    alert("✅ Email sent!");
  } else {
    alert("❌ Failed to send");
  }
};
</script>

</body>
</html>
