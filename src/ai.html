<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Follow-Up</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

nav {
  background: #0D1B2A;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 30px;
  max-width: 800px;
  margin: auto;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 15px;
}

button {
  padding: 10px;
  background: #C9A84C;
  border: none;
  cursor: pointer;
  width: 100%;
}

.output {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 8px;
  white-space: pre-line;
}
</style>
</head>

<body>

<nav>
  <div>PropAI</div>
  <button onclick="goBack()">Dashboard</button>
</nav>

<div class="container">
  <h1>AI Follow-Up Generator</h1>

  <label>Client Name</label>
  <input id="name" placeholder="John Smith">

  <label>Property Type</label>
  <select id="type">
    <option>House</option>
    <option>Condo</option>
    <option>Townhome</option>
    <option>Apartment</option>
  </select>

  <label>Location</label>
  <input id="location" placeholder="Miami, FL">

  <label>Key Features</label>
  <input id="features" placeholder="3 bed, 2 bath, pool, waterfront">

  <label>Lead Situation</label>
  <textarea id="situation" placeholder="Example: Asked for more info, wants a showing this weekend..."></textarea>

  <button onclick="generate()">Generate Follow-Up</button>

  <div id="result" class="output" style="display:none;"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// 🔒 PROTECT PAGE
const { data: { session } } = await supabase.auth.getSession();
if (!session) {
  window.location.href = "/src/login.html";
}

// BACK BUTTON
window.goBack = () => {
  window.location.href = "/index.html";
};

// 🚀 SMARTER RESPONSE
window.generate = () => {
  const name = document.getElementById("name").value || "there";
  const type = document.getElementById("type").value;
  const location = document.getElementById("location").value;
  const features = document.getElementById("features").value;
  const situation = document.getElementById("situation").value;

  const response = `
Hi ${name},

Thanks for reaching out about the ${type} in ${location}!

This property features ${features}, and it’s a great opportunity based on what you’re looking for.

${situation ? "I understand your situation: " + situation : ""}

I’d be happy to get you more details or schedule a showing at a time that works for you.

Let me know what your availability looks like!

Best,
Your Agent
  `;

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerText = response;
};
</script>

</body>
</html>
