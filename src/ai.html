<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Follow-Up</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

nav {
  background: #0D1B2A;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 30px;
  max-width: 800px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 10px;
  background: #C9A84C;
  border: none;
  cursor: pointer;
}

.output {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 8px;
}
</style>
</head>

<body>

<nav>
  <div>PropAI</div>
  <button onclick="goBack()">Dashboard</button>
</nav>

<div class="container">
  <h1>AI Follow-Up Generator</h1>

  <p>Enter a lead message or situation:</p>

  <textarea id="input" placeholder="Example: New Zillow lead asking about a 3 bed home..."></textarea>

  <button onclick="generate()">Generate Response</button>

  <div id="result" class="output" style="display:none;"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// 🔒 PROTECT PAGE
const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  window.location.href = "/src/login.html";
}

// BACK BUTTON
window.goBack = () => {
  window.location.href = "/index.html";
};

// 🚀 FAKE AI (for now)
window.generate = () => {
  const input = document.getElementById("input").value;

  if (!input) {
    alert("Enter something first");
    return;
  }

  const response = `
Hi there! Thanks for reaching out about this property.

I'd be happy to help you schedule a showing or provide more details. Let me know what time works best for you, and I’ll get everything set up.

Looking forward to connecting!
  `;

  const result = document.getElementById("result");
  result.style.display = "block";
  result.innerText = response;
};
</script>

</body>
</html>
