<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - PropAI Realty</title>
</head>
<body>
  <h1>Login to PropAI Realty</h1>

  <form id="login-form">
    <label>
      Email:
      <input type="email" id="email" required>
    </label>
    <button type="submit">Send Magic Link</button>
  </form>

  <p id="status"></p>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // Supabase config
    const supabase = createClient(
      "https://jrmqdojsxjtkjpczaysp.supabase.co",
      "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
    );

    const form = document.getElementById("login-form");
    const status = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;

      status.textContent = "Sending magic link...";

      const { error } = await supabase.auth.signInWithOtp({
        email: email,
        options: {
          emailRedirectTo: "https://prop-ai-realty.netlify.app/src/router.html"
        }
      });

      if (error) {
        console.error(error);
        status.textContent = "❌ " + error.message;
      } else {
        status.textContent = "✅ Check your email for your login link";
      }
    });
  </script>
</body>
</html>
