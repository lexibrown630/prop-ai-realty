<!DOCTYPE html>
<html>
<head>
  <title>Login - PropAI</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://jrmqdojsxjtkjpczaysp.supabase.co",
      "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
    );

    async function login() {
      const email = document.getElementById("email").value;

      const { error } = await supabase.auth.signInWithOtp({
        email
      });

      if (error) {
        alert(error.message);
      } else {
        alert("Check your email for login link");
      }
    }

    window.login = login;
  </script>
</head>

<body style="font-family:Arial;text-align:center;padding:80px;">
  <h2>PropAI Login</h2>

  <input id="email" placeholder="Enter email" style="padding:10px;width:250px;">
  <br><br>

  <button onclick="login()" style="padding:10px 20px;">
    Send Magic Link
  </button>
</body>
</html>
