<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Routing - PropAI Realty</title>
</head>
<body>
  <h2>Logging you in...</h2>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://jrmqdojsxjtkjpczaysp.supabase.co",
      "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
    );

    async function handleLogin() {
      // 🔑 This is the KEY FIX
      const { data, error } = await supabase.auth.getSession();

      if (error) {
        console.error("Auth error:", error);
      }

      const session = data.session;

      if (!session) {
        console.log("No session found, redirecting to login...");
        window.location.href = "/src/login.html";
        return;
      }

      const email = session.user.email;

      console.log("User logged in:", email);

      // 🔐 Check paid access
      const res = await fetch("/.netlify/functions/checkAccess", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });

      const result = await res.json();

      if (!result.access) {
        window.location.href = "/src/payments.html";
        return;
      }

      // ✅ SUCCESS → go to app
      window.location.href = "/index.html";
    }

    handleLogin();
  </script>
</body>
</html>
