<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Routing - PropAI Realty</title>
</head>
<body>
  <h2 id="status">Logging you in...</h2>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://jrmqdojsxjtkjpczaysp.supabase.co",
      "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
    );

    const status = document.getElementById("status");

    async function handleLogin() {
      // ✅ CRITICAL: process magic link tokens from URL
      const { data, error } = await supabase.auth.exchangeCodeForSession(window.location.href);

      if (error) {
        console.error("Exchange error:", error);
        status.textContent = "❌ Login link expired or invalid. Try again.";
        return;
      }

      // Now get session AFTER exchange
      const { data: sessionData } = await supabase.auth.getSession();
      const session = sessionData.session;

      if (!session) {
        status.textContent = "❌ No session found. Redirecting...";
        setTimeout(() => {
          window.location.href = "/src/login.html";
        }, 2000);
        return;
      }

      const email = session.user.email;
      console.log("Logged in:", email);

      status.textContent = "✅ Logged in! Checking access...";

      // 🔐 Check access
      const res = await fetch("/.netlify/functions/checkAccess", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });

      const result = await res.json();

      if (!result.access) {
        status.textContent = "➡️ Redirecting to payment...";
        window.location.href = "/src/payments.html";
        return;
      }

      // ✅ SUCCESS
      status.textContent = "🚀 Redirecting to dashboard...";
      window.location.href = "/index.html";
    }

    handleLogin();
  </script>
</body>
</html>
