<!DOCTYPE html>
<html>
<head>
  <title>Choose Plan</title>
</head>
<body>
  <h1>Choose your plan</h1>

  <button onclick="goToCheckout('price_123')">
    Starter - $79.99/month
  </button>

  <button onclick="goToCheckout('price_456')">
    Agency - $149.99/month
  </button>

  <button onclick="goToCheckout('price_789')">
    Pro - $349.99/month
  </button>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabase = createClient(
      "https://jrmqdojsxjtkjpczaysp.supabase.co",
      "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
    );

    window.goToCheckout = async (priceId) => {
      const {
        data: { user },
      } = await supabase.auth.getUser();

      if (!user) {
        alert("You must be logged in first");
        return;
      }

      console.log("User:", user.email);

      const res = await fetch("/.netlify/functions/createCheckout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          priceId: priceId,
          email: user.email,
        }),
      });

      const data = await res.json();

      console.log("Checkout response:", data);

      if (!data.url) {
        alert("❌ No checkout URL returned");
        return;
      }

      window.location.href = data.url;
    };
  </script>
</body>
</html>
