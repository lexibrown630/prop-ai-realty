<!DOCTYPE html>
<html>
<head>
  <title>PropAI Subscription</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; max-width: 700px; margin: auto; padding: 40px;">

  <h1>Unlock PropAI Booking System</h1>

  <p style="color: #555;">
    Choose a plan to access automated property scheduling and reminders.
  </p>

  <hr>

  <!-- STARTER -->
  <div style="margin-bottom: 30px;">
    <h2>Starter — $79/month</h2>
    <p>Basic booking access for individual agents.</p>
    <button onclick="subscribe('price_1TN45MRqy7IFyseNJtzPtgVC')">
      Start Starter Plan
    </button>
  </div>

  <hr>

  <!-- PRO -->
  <div style="margin-bottom: 30px;">
    <h2>Pro — $149/month</h2>
    <p>For growing agents handling multiple listings.</p>
    <button onclick="subscribe('price_1TN46TRqy7IFyseNHEiBa8xe')">
      Start Pro Plan
    </button>
  </div>

  <hr>

  <!-- AGENCY -->
  <div style="margin-bottom: 30px;">
    <h2>Agency — $389/month</h2>
    <p>Full automation for teams & brokerages.</p>
    <button onclick="subscribe('price_1TN47TRqy7IFyseNqnUSkEoO')">
      Start Agency Plan
    </button>
  </div>

  <script>
    async function subscribe(priceId) {
      try {
        const email = prompt("Enter your email to continue:");

        if (!email) return;

        const res = await fetch("/.netlify/functions/createCheckout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            priceId,
            email
          })
        });

        const data = await res.json();

        if (data.url) {
          window.location.href = data.url;
        } else {
          alert("Checkout failed. Try again.");
        }

      } catch (err) {
        alert("Error: " + err.message);
      }
    }
  </script>

</body>
</html>
