<!DOCTYPE html>
<html>
<head>
  <title>Subscribe - PropAI</title>
</head>

<body style="font-family: Arial; padding: 40px; max-width: 600px; margin:auto;">

  <h1>Choose Your Plan</h1>

  <p>Select a subscription to unlock booking access.</p>

  <hr>

  <h3>Starter Plan - $79/month</h3>
  <button onclick="subscribe('price_1TN45MRqy7IFyseNJtzPtgVC')">
    Subscribe Starter
  </button>

  <hr>

  <h3>Pro Plan - $149/month</h3>
  <button onclick="subscribe('price_1TN46TRqy7IFyseNHEiBa8xe')">
    Subscribe Pro
  </button>

  <hr>

  <h3>Agency Plan - $389/month</h3>
  <button onclick="subscribe('price_1TN47TRqy7IFyseNqnUSkEoO')">
    Subscribe Agency
  </button>

  <script>
    async function subscribe(priceId) {
      const email = prompt("Enter your email:");

      if (!email) return;

      const res = await fetch("/.netlify/functions/createCheckout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          priceId,
          email
        })
      });

      const data = await res.json();

      if (data.url) {
        window.location.href = data.url;
      } else {
        alert("Error creating checkout");
      }
    }
  </script>

</body>
</html>
