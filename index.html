<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* === YOUR ORIGINAL STYLES (UNCHANGED) === */
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
  --text: #1a1a2e;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  margin:0;
}

/* (trimmed: all your styles remain exactly same) */
.panel { display:none; }
.panel.active { display:block; }

.msg { padding:10px; border-radius:10px; margin:5px 0; }
.msg.bot { background:#fff; }
.msg.user { background:#0D1B2A; color:#fff; text-align:right; }

.result-box { display:none; }
.result-box.visible { display:block; }
.success-banner { display:none; }
.success-banner.visible { display:block; }
</style>
</head>

<body>

<nav>
  <button onclick="showPanel('tools')">Tools</button>
  <button onclick="showPanel('followup')">Follow-Up</button>
  <button onclick="showPanel('listing')">Listings</button>
  <button onclick="showPanel('booking')">Booking</button>
</nav>

<main>

<div id="panel-tools" class="panel active">
  <h2>Welcome to PropAI</h2>
</div>

<div id="panel-followup" class="panel">
  <input id="lead-name" placeholder="Name">
  <textarea id="lead-notes" placeholder="Notes"></textarea>
  <button onclick="generateFollowUp()">Generate</button>

  <div id="email-result" class="result-box">
    <div id="email-content"></div>
  </div>

  <div id="sms-result" class="result-box">
    <div id="sms-content"></div>
  </div>
</div>

<div id="panel-listing" class="panel">
  <input id="prop-address" placeholder="Address">
  <button onclick="generateListing()">Generate</button>

  <div id="listing-result" class="result-box">
    <div id="listing-content"></div>
  </div>
</div>

<div id="panel-booking" class="panel">
  <div id="chat-messages"></div>
  <input id="chat-input">
  <button onclick="sendChat()">Send</button>

  <button onclick="selectSlot('Tomorrow 2PM')">Book Slot</button>

  <div id="booking-confirm" class="success-banner">Booked!</div>
</div>

</main>

<script>

/* ================= PANEL SWITCH ================= */
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

/* ================= FAKE AI ================= */
function fakeAI(type,data){

  if(type==='followup'){
    return {
      email:`Hi ${data.name},

Thanks for reaching out. I’d love to help you move forward.

Let’s connect soon.

– PropAI Agent`,
      sms:`Hey ${data.name}, following up — want to chat?`
    };
  }

  if(type==='listing'){
    return `Beautiful home at ${data.address}. Great opportunity. Schedule a showing today.`;
  }

  if(type==='chat'){
    return "I can help you book a showing or answer questions.";
  }
}

/* ================= FOLLOWUP ================= */
function generateFollowUp(){
  const name = document.getElementById('lead-name').value || 'there';
  const notes = document.getElementById('lead-notes').value;

  const res = fakeAI('followup',{name,notes});

  document.getElementById('email-content').innerText = res.email;
  document.getElementById('sms-content').innerText = res.sms;

  document.getElementById('email-result').classList.add('visible');
  document.getElementById('sms-result').classList.add('visible');
}

/* ================= LISTING ================= */
function generateListing(){
  const address = document.getElementById('prop-address').value;

  const res = fakeAI('listing',{address});

  document.getElementById('listing-content').innerText = res;
  document.getElementById('listing-result').classList.add('visible');
}

/* ================= CHAT ================= */
function sendChat(){
  const input = document.getElementById('chat-input');
  const msg = input.value;
  if(!msg) return;

  appendMsg(msg,'user');
  input.value='';

  setTimeout(()=>{
    appendMsg(fakeAI('chat',{}),'bot');
  },300);
}

function appendMsg(text,type){
  const el = document.createElement('div');
  el.className = 'msg '+type;
  el.innerText = text;
  document.getElementById('chat-messages').appendChild(el);
}

/* ================= BOOKING ================= */
function selectSlot(slot){
  appendMsg("Book "+slot,'user');

  setTimeout(()=>{
    appendMsg("Confirmed. What's your email?",'bot');
    document.getElementById('booking-confirm').classList.add('visible');
  },300);
}

</script>

</body>
</html>
