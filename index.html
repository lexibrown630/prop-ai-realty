<!DOCTYPE html>
<html>
<head>
  <title>PropAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0D1B2A;
      color: white;
    }

    .nav {
      display: flex;
      background: #111;
    }

    .nav-tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .nav-tab.active {
      border-bottom: 2px solid #C9A84C;
    }

    .panel {
      display: none;
      padding: 20px;
    }

    .panel.active {
      display: block;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      background: #C9A84C;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }

    #chat-messages {
      height: 300px;
      overflow-y: auto;
      background: #222;
      padding: 10px;
    }

    .msg {
      margin: 5px 0;
    }

    .user { color: #C9A84C; }
    .bot { color: white; }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-tab active" onclick="showPanel('tools')">Chat</div>
  <div class="nav-tab" onclick="showPanel('followup')">Follow-Up</div>
  <div class="nav-tab" onclick="showPanel('listing')">Listings</div>
  <div class="nav-tab" onclick="showPanel('booking')">Booking</div>
</div>

<!-- CHAT -->
<div id="panel-tools" class="panel active">
  <h2>AI Chat</h2>
  <div id="chat-messages"></div>
  <input id="chat-input" placeholder="Ask about a property..." />
  <button onclick="sendChat()">Send</button>
</div>

<!-- FOLLOW UP -->
<div id="panel-followup" class="panel">
  <h2>Follow-Up Generator</h2>

  <input id="lead-name" placeholder="Name">
  <input id="lead-contact" placeholder="Email or Phone">
  <input id="lead-source" placeholder="Zillow, Facebook, etc">
  <input id="lead-type" placeholder="Buyer / Seller">
  <textarea id="lead-notes" placeholder="Notes"></textarea>

  <button id="followup-btn" onclick="generateFollowUp()">Generate</button>

  <h3>Email</h3>
  <div id="email-content"></div>

  <h3>SMS</h3>
  <div id="sms-content"></div>
</div>

<!-- LISTINGS -->
<div id="panel-listing" class="panel">
  <h2>Listing Generator</h2>

  <input id="prop-address" placeholder="Address">
  <input id="prop-beds" placeholder="Beds/Baths">
  <input id="prop-sqft" placeholder="Sqft">
  <input id="prop-price" placeholder="Price">
  <input id="prop-year" placeholder="Year Built">
  <textarea id="prop-features" placeholder="Features"></textarea>

  <button id="listing-btn" onclick="generateListing()">Generate</button>

  <div id="listing-content"></div>
</div>

<!-- BOOKING -->
<div id="panel-booking" class="panel">
  <h2>Booking</h2>

  <input id="booking-email" placeholder="Client Email">
  <input id="booking-time" placeholder="ISO Time (2026-04-20T14:00:00)">

  <button onclick="bookNow()">Book Showing</button>

  <div id="booking-result"></div>
</div>

<!-- LOGIN PROTECTION -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  window.location.href = "/src/login.html";
}
</script>

<!-- YOUR ORIGINAL LOGIC -->
<script src="/script.js"></script>

<!-- BOOKING CONNECT -->
<script>
async function bookNow() {
  const email = document.getElementById("booking-email").value;
  const start = document.getElementById("booking-time").value;

  const end = new Date(new Date(start).getTime() + 30*60000).toISOString();

  const res = await fetch("/.netlify/functions/booking", {
    method: "POST",
    body: JSON.stringify({
      email,
      startTime: start,
      endTime: end,
      title: "Property Showing"
    })
  });

  const data = await res.json();

  document.getElementById("booking-result").innerText =
    data.success ? "Booked ✅" : data.error;
}
</script>

</body>
</html>
