<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
}

/* NAVBAR */
nav {
  background: var(--navy);
  padding: 16px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.logout {
  background: var(--gold);
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  background: var(--navy);
  color: white;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.hero p {
  margin-top: 10px;
  opacity: 0.8;
}

/* STATUS */
#status {
  text-align: center;
  margin: 30px 0;
  font-weight: 500;
}

/* DASHBOARD GRID */
.dashboard {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-4px);
}

.card h3 {
  margin-top: 0;
}

/* PLAN BADGE */
.plan {
  display: inline-block;
  background: var(--gold);
  color: black;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>
  <button class="logout" onclick="logout()">Logout</button>
</nav>

<div class="hero">
  <h1>Your AI Real Estate Dashboard</h1>
  <p id="planText">Loading plan...</p>
</div>

<div id="status">Checking access...</div>

<div class="dashboard">
  <div id="features" class="grid"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("status").innerText = "Redirecting to login...";
    setTimeout(() => {
      window.location.href = "/src/login.html";
    }, 1200);
    return;
  }

  const email = session.user.email;

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", email);

  const user = data && data[0];

  if (!user) {
    document.getElementById("status").innerText = "No account → billing";
    setTimeout(() => {
      window.location.href = "/src/payments.html";
    }, 1500);
    return;
  }

  if (user.subscription_status !== "active") {
    document.getElementById("status").innerText = "Subscription required → billing";
    setTimeout(() => {
      window.location.href = "/src/payments.html";
    }, 1500);
    return;
  }

  // ✅ SUCCESS UI
  document.getElementById("status").innerText = "";
  document.getElementById("planText").innerHTML =
    "Current Plan: <span class='plan'>" + user.plan.toUpperCase() + "</span>";

  renderFeatures(user.plan);
}

// 🎯 FEATURE RENDERING
function renderFeatures(plan) {
  const el = document.getElementById("features");

  if (plan === "starter") {
    el.innerHTML = `
      <div class="card"><h3>Leads</h3><p>Basic lead tracking system</p></div>
      <div class="card"><h3>Scheduling</h3><p>Simple appointment booking</p></div>
    `;
  }

  if (plan === "pro") {
    el.innerHTML = `
      <div class="card"><h3>AI Follow-Up</h3><p>Automated lead responses</p></div>
      <div class="card"><h3>Smart Scheduling</h3><p>Optimized booking system</p></div>
      <div class="card"><h3>Listing AI</h3><p>Generate listings instantly</p></div>
      <div class="card"><h3>Automation</h3><p>Workflow automation tools</p></div>
    `;
  }

  if (plan === "agency") {
    el.innerHTML = `
      <div class="card"><h3>Full AI Suite</h3><p>Everything unlocked</p></div>
      <div class="card"><h3>Multi-Agent</h3><p>Team collaboration tools</p></div>
      <div class="card"><h3>Advanced Automation</h3><p>Complex workflows</p></div>
      <div class="card"><h3>White Label</h3><p>Custom branding features</p></div>
    `;
  }
}

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

checkAccess();
</script>

</body>
</html>
