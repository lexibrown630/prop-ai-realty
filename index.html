<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 40px;
}
</style>
</head>

<body>

<h1>Dashboard</h1>
<p id="status">Checking login...</p>
<button onclick="logout()">Logout</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  // ❌ NOT LOGGED IN → go to login
  if (!session) {
    document.getElementById("status").innerText = "Not logged in → redirecting...";
    window.location.href = "/src/login.html";
    return;
  }

  const email = session.user.email;
  document.body.innerHTML = "<h1>Logged in as: " + email + "</h1>";
return;
  document.getElementById("status").innerText = "Logged in as: " + email;

  // 🔍 Check DB
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", email);

  const user = data && data[0];

  // ❌ No user → go to billing
  if (!user) {
    document.getElementById("status").innerText = "No user found → billing";
    window.location.href = "/src/payments.html";
    return;
  }

  // ❌ Not active → billing
  if (user.subscription_status !== "active") {
    document.getElementById("status").innerText = "Not subscribed → billing";
    window.location.href = "/src/payments.html";
    return;
  }

  // ✅ SUCCESS
  document.getElementById("status").innerText =
    "✅ Logged in | Plan: " + user.plan;
}

// logout
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

checkAccess();
</script>

</body>
</html>
