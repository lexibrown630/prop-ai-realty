<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0D1B2A;
  color: white;
}

.nav {
  display: flex;
  background: #08121c;
}

.nav-tab {
  padding: 15px 20px;
  cursor: pointer;
}

.nav-tab.active {
  background: #C9A84C;
  color: black;
}

.panel {
  display: none;
  padding: 20px;
}

.panel.active {
  display: block;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: #C9A84C;
  border: none;
  padding: 10px;
  cursor: pointer;
  width: 100%;
}

#chat-messages {
  height: 300px;
  overflow-y: auto;
  background: white;
  color: black;
  padding: 10px;
}

.msg {
  margin: 5px 0;
}

.user { text-align: right; }
.bot { text-align: left; }

.result-box {
  background: white;
  color: black;
  padding: 10px;
  margin-top: 10px;
  display: none;
}

.result-box.visible {
  display: block;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-tab active" onclick="showPanel('tools')">Chat</div>
  <div class="nav-tab" onclick="showPanel('followup')">Follow-Up</div>
  <div class="nav-tab" onclick="showPanel('listing')">Listings</div>
  <div class="nav-tab" onclick="showPanel('booking')">Booking</div>
</div>

<!-- CHAT -->
<div id="panel-tools" class="panel active">
  <h2>AI Chat</h2>

  <div id="chat-messages"></div>

  <input id="chat-input" placeholder="Ask about a property...">
  <button onclick="sendChat()">Send</button>
</div>

<!-- FOLLOW UP -->
<div id="panel-followup" class="panel">
  <h2>Follow-Up Generator</h2>

  <input id="lead-name" placeholder="Client Name">
  <input id="lead-contact" placeholder="Email or Phone">
  <input id="lead-source" placeholder="Zillow, Website, etc">
  <input id="lead-type" placeholder="Buyer / Seller">
  <textarea id="lead-notes" placeholder="Notes"></textarea>

  <button id="followup-btn" onclick="generateFollowUp()">Generate</button>

  <div id="email-result" class="result-box">
    <h3>Email</h3>
    <div id="email-content"></div>
  </div>

  <div id="sms-result" class="result-box">
    <h3>SMS</h3>
    <div id="sms-content"></div>
  </div>
</div>

<!-- LISTING -->
<div id="panel-listing" class="panel">
  <h2>Listing Generator</h2>

  <input id="prop-address" placeholder="Address">
  <input id="prop-beds" placeholder="Beds/Baths">
  <input id="prop-sqft" placeholder="Sqft">
  <input id="prop-price" placeholder="Price">
  <input id="prop-year" placeholder="Year Built">
  <textarea id="prop-features" placeholder="Features"></textarea>

  <button id="listing-btn" onclick="generateListing()">Generate</button>

  <div id="listing-result" class="result-box">
    <div id="listing-content"></div>
  </div>
</div>

<!-- BOOKING -->
<div id="panel-booking" class="panel">
  <h2>Booking</h2>

  <button onclick="getSlots()">Get Available Times</button>

  <div id="slots"></div>

  <div id="booking-confirm" class="result-box">
    <button onclick="confirmBooking()">Confirm Booking</button>
  </div>
</div>

<!-- SCRIPT CONNECTS EVERYTHING -->
<script src="/script.js"></script>

<script>
/* BOOKING CONNECTION */
async function getSlots() {
  const res = await fetch('/.netlify/functions/booking', {
    method: 'POST',
    body: JSON.stringify({ action: 'suggest' })
  });

  const data = await res.json();

  const container = document.getElementById('slots');
  container.innerHTML = '';

  data.suggestions.forEach(s => {
    const btn = document.createElement('button');
    btn.innerText = new Date(s.start).toLocaleString();
    btn.onclick = () => selectSlot(btn, btn.innerText);
    container.appendChild(btn);
  });
}

async function confirmBooking() {
  const res = await fetch('/.netlify/functions/booking', {
    method: 'POST',
    body: JSON.stringify({
      action: 'book',
      startTime: new Date().toISOString(),
      endTime: new Date(Date.now()+30*60000).toISOString(),
      email: "test@test.com"
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
}
</script>

</body>
</html>
