<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* NAV */
nav {
  background: #0D1B2A;
  color: white;
  padding: 15px;
  display: flex;
  gap: 15px;
}

.nav-tab {
  cursor: pointer;
  opacity: 0.7;
}

.nav-tab.active {
  opacity: 1;
  font-weight: bold;
}

/* PANELS */
.panel {
  display: none;
  padding: 20px;
}

.panel.active {
  display: block;
}

/* CHAT */
#chat-messages {
  height: 300px;
  overflow-y: auto;
  background: white;
  padding: 10px;
  margin-bottom: 10px;
}

.msg {
  margin: 5px 0;
}

.msg.user {
  text-align: right;
}

.msg.bot {
  text-align: left;
}

/* BUTTONS */
button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-tab active" onclick="showPanel('tools')">Chat</div>
  <div class="nav-tab" onclick="showPanel('followup')">Follow-Up</div>
  <div class="nav-tab" onclick="showPanel('listing')">Listings</div>
  <div class="nav-tab" onclick="showPanel('booking')">Booking</div>
  <div class="nav-tab" onclick="showPanel('embed')">Embed</div>
</nav>

<!-- =========================
CHAT PANEL (YOUR ORIGINAL AI)
========================= -->
<div id="panel-tools" class="panel active">
  <h2>AI Assistant</h2>

  <div id="chat-messages"></div>

  <input id="chat-input" placeholder="Ask about a property or book a showing..." />
  <button onclick="sendChat()">Send</button>
</div>

<!-- =========================
FOLLOW UP PANEL
========================= -->
<div id="panel-followup" class="panel">
  <h2>Follow-Up Generator</h2>

  <input id="lead-name" placeholder="Client name" />
  <input id="lead-contact" placeholder="Email or phone" />
  <input id="lead-source" placeholder="Zillow, website, etc" />
  <input id="lead-type" placeholder="Buyer / Seller" />
  <textarea id="lead-notes" placeholder="Notes..."></textarea>

  <button id="followup-btn" onclick="generateFollowUp()">Generate</button>

  <h3>Email</h3>
  <div id="email-result"><pre id="email-content"></pre></div>

  <h3>SMS</h3>
  <div id="sms-result"><pre id="sms-content"></pre></div>
</div>

<!-- =========================
LISTINGS PANEL
========================= -->
<div id="panel-listing" class="panel">
  <h2>Listing Generator</h2>

  <input id="prop-address" placeholder="Address" />
  <input id="prop-beds" placeholder="Beds/Baths" />
  <input id="prop-sqft" placeholder="Sqft" />
  <input id="prop-price" placeholder="Price" />
  <input id="prop-year" placeholder="Year built" />
  <input id="prop-features" placeholder="Features" />
  <input id="prop-tone" placeholder="Luxury, modern..." />

  <button id="listing-btn" onclick="generateListing()">Generate Listing</button>

  <div id="listing-result">
    <pre id="listing-content"></pre>
  </div>
</div>

<!-- =========================
BOOKING PANEL
========================= -->
<div id="panel-booking" class="panel">
  <h2>Booking</h2>

  <p>Select a time slot:</p>

  <button class="slot-btn" onclick="selectSlot(this, '9:00 AM')">9:00 AM</button>
  <button class="slot-btn" onclick="selectSlot(this, '11:00 AM')">11:00 AM</button>
  <button class="slot-btn" onclick="selectSlot(this, '2:00 PM')">2:00 PM</button>

  <div id="booking-confirm">
    <button onclick="alert('Booking confirmed (connect to booking.js next)')">
      Confirm Booking
    </button>
  </div>
</div>

<!-- =========================
EMBED PANEL
========================= -->
<div id="panel-embed" class="panel">
  <h2>Embed</h2>

  <input id="agency-name" placeholder="Agency name" />
  <input id="primary-color" placeholder="#C9A84C" />

  <button onclick="updateEmbedCode()">Generate Code</button>

  <pre id="embed-code-block"></pre>
</div>

<!-- YOUR ORIGINAL SCRIPT -->
<script src="/script.js"></script>

</body>
</html>
