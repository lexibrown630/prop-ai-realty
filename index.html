<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --panel:#111827;
  --card:#1f2937;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#6366f1;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:linear-gradient(180deg,#020617,#0b0f1a);color:var(--text);}

.app{display:flex;height:100vh;}

.sidebar{
  width:240px;background:rgba(2,6,23,0.9);
  backdrop-filter:blur(10px);
  padding:20px;display:flex;flex-direction:column;justify-content:space-between;
  border-right:1px solid rgba(255,255,255,0.05);
}
.logo{font-weight:600;font-size:18px;margin-bottom:30px;}

.nav-item{padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--muted);}
.nav-item:hover{background:rgba(255,255,255,0.05);color:white;}
.nav-item.active{background:rgba(99,102,241,0.15);color:white;}

.main{flex:1;padding:30px;overflow:auto;}

.page{display:none;animation:fade .25s ease;}
.page.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;}}

.header{display:flex;justify-content:space-between;margin-bottom:30px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}

.card{
  background:linear-gradient(145deg,#1f2937,#111827);
  padding:22px;border-radius:14px;
}
.card:hover{transform:translateY(-4px);}

.btn{
  background:var(--accent);
  border:none;padding:10px 14px;border-radius:8px;
  cursor:pointer;color:white;
}

input{
  width:100%;padding:12px;border-radius:8px;border:none;
  margin-top:10px;background:#020617;color:white;
}

.chat{height:300px;overflow:auto;background:#020617;padding:12px;border-radius:10px;}
.msg{margin-bottom:8px;}

.usage-bar{height:6px;background:#1e293b;border-radius:10px;margin-top:8px;}
.usage-fill{height:100%;background:var(--accent);width:0%;}

/* PAYWALL */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;justify-content:center;align-items:center;
}
.modal-box{
  background:#111827;padding:30px;border-radius:14px;width:350px;text-align:center;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar">
  <div>
    <div class="logo">PropAI</div>
    <div class="nav-item active" onclick="nav(this,'dashboard')">Dashboard</div>
    <div class="nav-item" onclick="nav(this,'followup')">Follow-Up</div>
    <div class="nav-item" onclick="nav(this,'listing')">Listings</div>
    <div class="nav-item" onclick="nav(this,'chat')">Assistant</div>
  </div>

  <div>
    <div id="plan">STARTER</div>
    <div id="usageText">0/10</div>
    <div class="usage-bar"><div id="usageFill" class="usage-fill"></div></div>

```
<button class="btn" onclick="openBilling()" style="margin-top:10px;">Billing</button>
<button class="btn" onclick="showPaywall()" style="margin-top:10px;background:#374151;">Upgrade</button>
```

  </div>
</div>

<div class="main">

<div id="page-dashboard" class="page active">
  <div class="header"><h2>Dashboard</h2></div>

  <div class="grid">
    <div class="card"><h3>Follow-Up</h3><button class="btn" onclick="go('followup')">Open</button></div>
    <div class="card"><h3>Listings</h3><button class="btn" onclick="go('listing')">Open</button></div>
    <div class="card"><h3>Assistant</h3><button class="btn" onclick="go('chat')">Open</button></div>
  </div>
</div>

<div id="page-followup" class="page">
  <h2>Follow-Up</h2>
  <input id="lead" placeholder="Lead name">
  <button class="btn" onclick="followUp()">Generate</button>
  <pre id="follow-output"></pre>
</div>

<div id="page-listing" class="page">
  <h2>Listings</h2>
  <input id="address" placeholder="Address">
  <button class="btn" onclick="listing()">Generate</button>
  <pre id="listing-output"></pre>
</div>

<div id="page-chat" class="page">
  <h2>Assistant</h2>
  <div id="chatbox" class="chat"></div>
  <input id="msg" placeholder="Message..." onkeydown="if(event.key==='Enter')chat()">
  <button class="btn" onclick="chat()">Send</button>
</div>

</div>
</div>

<!-- PAYWALL -->

<div id="paywall" class="modal">
  <div class="modal-box">
    <h2>Upgrade Required</h2>
    <p>Unlock listings + higher limits</p>
    <button class="btn" onclick="startCheckout('pro')">Upgrade to Pro</button>
    <button class="btn" onclick="startCheckout('agency')" style="margin-top:10px;background:#374151;">Go Agency</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient("https://jrmqdojsxjtkjpczaysp.supabase.co","sb_publishable_...");

let usage=0,limit=10,plan="starter";

/* AUTH */
const {data}=await supabase.auth.getSession();
if(!data.session) location.href="/login.html";

/* LOAD USER */
const user=await supabase.from("users").select("*").eq("id",data.session.user.id).single();
if(user.data){
  usage=user.data.usage_count||0;
  plan=user.data.plan||"starter";
}

limit=plan==="starter"?10:plan==="pro"?100:999999;
updateUI();

/* UI */
function updateUI(){
  document.getElementById("plan").innerText=plan.toUpperCase();
  document.getElementById("usageText").innerText=`${usage}/${limit===999999?"∞":limit}`;
  document.getElementById("usageFill").style.width=(usage/limit*100)+"%";
}

/* NAV */
window.nav=(el,p)=>{
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  go(p);
};
window.go=(p)=>{
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
};

/* PAYWALL */
window.showPaywall=()=>document.getElementById("paywall").style.display="flex";

/* API */
async function api(body){
  const {data:{session}}=await supabase.auth.getSession();
  return fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${session.access_token}`
    },
    body:JSON.stringify(body)
  });
}

/* CHECKOUT */
window.startCheckout=async(planType)=>{
  const {data:{session}}=await supabase.auth.getSession();
  const email=session.user.email;

  let priceId=null;
  if(planType==="pro") priceId="price_1TN46TRqy7IFyseNHEiBa8xe";
  if(planType==="agency") priceId="price_1TN47TRqy7IFyseNqnUSkEoO";

  const res=await fetch('/.netlify/functions/create-checkout',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({priceId,email})
  });

  const data=await res.json();
  if(!data.url) return alert(data.error||"Checkout failed");

  location.href=data.url;
};

/* BILLING */
window.openBilling=async()=>{
  const {data:{session}}=await supabase.auth.getSession();

  const res=await fetch('/.netlify/functions/stripe-portal',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:session.user.email})
  });

  location.href=(await res.json()).url;
};

/* FEATURES */
window.chat=async()=>{
  if(usage>=limit) return showPaywall();
  const msg=document.getElementById("msg").value;

  const res=await api({message:msg});
  const data=await res.json();

  const el=document.createElement("div");
  el.className="msg"; el.innerText=data.reply;
  document.getElementById("chatbox").appendChild(el);

  usage++; updateUI();
};

window.followUp=async()=>{
  if(usage>=limit) return showPaywall();

  const name=document.getElementById("lead").value;
  const res=await api({message:`Follow up with ${name}`,type:"followup"});
  const data=await res.json();

  document.getElementById("follow-output").innerText=data.reply;
  usage++; updateUI();
};

window.listing=async()=>{
  if(plan==="starter") return showPaywall();
  if(usage>=limit) return showPaywall();

  const addr=document.getElementById("address").value;
  const res=await api({message:`Listing for ${addr}`,type:"listing"});
  const data=await res.json();

  document.getElementById("listing-output").innerText=data.reply;
  usage++; updateUI();
};
</script>

</body>
</html>
