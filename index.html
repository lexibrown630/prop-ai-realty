<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
}

/* LOADING */
#loading {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

/* NAV */
nav {
  background: var(--navy);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.btn {
  background: var(--gold);
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  background: var(--navy);
  color: white;
  padding: 80px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
}

/* DASHBOARD */
.dashboard {
  padding: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">Checking access...</div>

<!-- APP -->
<div id="app" style="display:none;">

<nav>
  <div class="logo">PropAI</div>
  <button class="btn" onclick="logout()">Logout</button>
</nav>

<div class="hero">
  <h1>AI Automation for Real Estate</h1>
  <p id="planLabel"></p>
</div>

<div class="dashboard" id="features"></div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  // 🚫 NOT LOGGED IN
  if (!session) {
    window.location.href = "/src/login.html";
    return;
  }

  const email = session.user.email;

  // 🔍 GET USER
  const { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("email", email)
    .single();

  console.log("User DB:", data);

  // 🚨 USER DOESN’T EXIST → CREATE
  if (!data) {
    await supabase.from("users").insert([
      {
        email,
        subscription_status: "inactive",
        plan: "starter"
      }
    ]);

    window.location.href = "/src/payments.html";
    return;
  }

  // 🚫 NOT PAID
  if (data.subscription_status !== "active") {
    window.location.href = "/src/payments.html";
    return;
  }

  // ✅ SHOW APP
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  document.getElementById("planLabel").innerText = 
    "Current Plan: " + data.plan.toUpperCase();

  renderFeatures(data.plan);
}

// 🎯 PLAN-BASED UI
function renderFeatures(plan) {
  const el = document.getElementById("features");

  if (plan === "starter") {
    el.innerHTML = `
      <div class="card"><h2>Leads</h2><p>Basic lead tracking</p></div>
      <div class="card"><h2>Bookings</h2><p>Basic scheduling</p></div>
    `;
  }

  if (plan === "pro") {
    el.innerHTML = `
      <div class="card"><h2>Leads</h2><p>Advanced AI lead follow-up</p></div>
      <div class="card"><h2>Bookings</h2><p>Smart scheduling system</p></div>
      <div class="card"><h2>Automation</h2><p>Automated workflows</p></div>
    `;
  }

  if (plan === "agency") {
    el.innerHTML = `
      <div class="card"><h2>Leads</h2><p>Full AI system</p></div>
      <div class="card"><h2>Bookings</h2><p>Multi-agent scheduling</p></div>
      <div class="card"><h2>Automation</h2><p>Advanced workflows</p></div>
      <div class="card"><h2>White Label</h2><p>Custom branding + widgets</p></div>
    `;
  }
}

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

checkAccess();
</script>

</body>
</html>
