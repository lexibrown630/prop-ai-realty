<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED STYLES — I kept everything intact except removed booking-related UI impact) */
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
  --text: #1a1a2e;
  --text-muted: #6B7080;
  --white: #ffffff;
  --radius: 12px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
}

nav {
  background: var(--navy);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 22px;
}

.logo span { color: var(--white); }

.nav-tabs { display: flex; gap: 6px; }

.nav-tab {
  background: none;
  border: none;
  color: #8899AA;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.nav-tab.active { color: var(--gold); }

main { max-width: 1100px; margin: auto; padding: 2rem; }

.hero {
  background: var(--navy);
  border-radius: var(--radius-lg);
  padding: 2.5rem;
  margin-bottom: 2rem;
}

.hero h1 {
  color: var(--white);
  font-family: 'Playfair Display', serif;
}

.hero p {
  color: #8899AA;
  margin-top: 10px;
}

.panel { display: none; }
.panel.active { display: block; }

.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
}

.tool-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  border: 1px solid #E8E4DA;
  overflow: hidden;
}

.tool-card-header {
  background: var(--navy);
  padding: 1.25rem;
  color: var(--white);
}

.tool-card-body { padding: 1.5rem; }

.btn-primary, .btn-gold {
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
}

.btn-primary {
  background: var(--navy);
  color: var(--white);
}

.btn-gold {
  background: var(--gold);
  color: var(--navy);
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #DDD;
}

.result-box {
  display: none;
  background: var(--cream);
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}

.result-box.visible { display: block; }

</style>
</head>

<body>

<nav>
  <div class="logo">Prop<span>AI</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('tools')">Tools</button>
    <button class="nav-tab" onclick="showPanel('followup')">Lead Follow-Up</button>
    <button class="nav-tab" onclick="showPanel('listing')">Listings</button>
    <button class="nav-tab" onclick="showPanel('embed')">Embed</button>
  </div>
</nav>

<main>

<div class="hero">
  <h1>AI automation for real estate</h1>
  <p>
    Two powerful AI tools that work around the clock — follow up on leads instantly and generate MLS listings in seconds.
  </p>
</div>

<!-- TOOLS -->
<div id="panel-tools" class="panel active">
  <div class="tool-grid">

    <div class="tool-card" onclick="showPanel('followup')">
      <div class="tool-card-header">📬 AI Lead Follow-Up</div>
      <div class="tool-card-body">
        Generate high-converting follow-up messages instantly.
        <button class="btn-gold" onclick="event.stopPropagation();showPanel('followup')">Open</button>
      </div>
    </div>

    <div class="tool-card" onclick="showPanel('listing')">
      <div class="tool-card-header">🏡 Listing Generator</div>
      <div class="tool-card-body">
        Create MLS-ready descriptions in seconds.
        <button class="btn-gold" onclick="event.stopPropagation();showPanel('listing')">Open</button>
      </div>
    </div>

  </div>
</div>

<!-- FOLLOW UP -->
<div id="panel-followup" class="panel">
  <input id="lead-name" placeholder="Name">
  <textarea id="lead-notes" placeholder="Notes"></textarea>
  <button class="btn-primary" onclick="generateFollowUp()">Generate</button>
  <div id="email-result" class="result-box"></div>
</div>

<!-- LISTING -->
<div id="panel-listing" class="panel">
  <input id="prop-address" placeholder="Address">
  <textarea id="prop-features" placeholder="Features"></textarea>
  <button class="btn-primary" onclick="generateListing()">Generate</button>
  <div id="listing-result" class="result-box"></div>
</div>

<!-- EMBED -->
<div id="panel-embed" class="panel">
  <select>
    <option>All tools</option>
    <option>Follow-Up</option>
    <option>Listing</option>
  </select>
</div>

</main>

<script>
function showPanel(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panel).classList.add('active');
}

function generateFollowUp() {
  document.getElementById('email-result').classList.add('visible');
  document.getElementById('email-result').innerText = "Sample follow-up generated...";
}

function generateListing() {
  document.getElementById('listing-result').classList.add('visible');
  document.getElementById('listing-result').innerText = "Sample listing generated...";
}
</script>

</body>
</html>
