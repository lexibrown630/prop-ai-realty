<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root { --gold:#C9A84C; --navy:#0D1B2A; --cream:#FAF8F3; }
body { font-family:'DM Sans',sans-serif; background:var(--cream); margin:0; }

nav {
  background:var(--navy);
  color:white;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo { font-family:'Playfair Display',serif; color:var(--gold); font-size:22px; }

.nav-tabs button {
  background:none;
  border:none;
  color:#8899AA;
  margin-left:12px;
  cursor:pointer;
  font-size:13px;
}
.nav-tabs button.active { color:var(--gold); }

.panel { display:none; padding:30px; max-width:1100px; margin:auto; }
.panel.active { display:block; }

.hero {
  background:var(--navy);
  color:white;
  border-radius:20px;
  padding:40px;
  margin-bottom:20px;
}

.card {
  background:white;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid #eee;
}

.chat-box {
  height:300px;
  overflow:auto;
  border:1px solid #eee;
  padding:10px;
  background:#fff;
  border-radius:10px;
}

.msg { margin-bottom:10px; }
.msg.user { text-align:right; }
.msg.bot { text-align:left; }

.btn {
  background:var(--gold);
  border:none;
  padding:10px 16px;
  cursor:pointer;
  border-radius:8px;
  font-weight:600;
}
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>
  <div class="nav-tabs">
    <button onclick="showPanel('tools')">Tools</button>
    <button onclick="showPanel('followup')">Follow-Up</button>
    <button onclick="showPanel('listing')">Listings</button>
    <button onclick="showPanel('booking')">Booking</button>

    <!-- NAV FIXED -->
    <button onclick="goLogin()">Login</button>
    <button onclick="goPricing()">Pricing</button>
  </div>
</nav>

<main>

<div class="hero">
  <h1>AI automation built for real estate professionals</h1>
  <p>Generate listings, follow up with leads, and book showings automatically.</p>
</div>

<div id="panel-tools" class="panel active">
  <div class="card">
    <h3>Welcome to PropAI</h3>
    <p>Select a tool above to get started.</p>
  </div>
</div>

<div id="panel-followup" class="panel">
  <div class="card">
    <h3>AI Lead Follow-Up</h3>
    <input id="lead-name" placeholder="Lead name">
    <button class="btn" onclick="generateFollowUp()">Generate</button>
    <pre id="email-content"></pre>
  </div>
</div>

<div id="panel-listing" class="panel">
  <div class="card">
    <h3>Listing Generator</h3>
    <input id="prop-address" placeholder="Property address">
    <button class="btn" onclick="generateListing()">Generate</button>
    <pre id="listing-content"></pre>
  </div>
</div>

<div id="panel-booking" class="panel">
  <div class="card">
    <h3>AI Assistant</h3>
    <div id="chat-messages" class="chat-box"></div>
    <input id="chat-input" placeholder="Type message..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn" onclick="sendChat()">Send</button>
  </div>
</div>

</main>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

/* 🚨 HIDE PAGE IMMEDIATELY */
document.documentElement.style.display = "none";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

/* 🔐 RELIABLE AUTH CHECK */
async function enforceAuth() {
  try {
    // 🔥 THIS IS THE FIX — wait for real session
    const { data: { session } } = await supabase.auth.getSession();

    if (!session || !session.user) {
      window.location.replace("/login.html");
      return;
    }

    // ✅ user confirmed → show app
    document.documentElement.style.display = "block";

  } catch (err) {
    console.error("Auth error:", err);
    window.location.replace("/login.html");
  }
}

await enforceAuth();

/* NAV */
window.goLogin = () => window.location.href = "/login.html";
window.goPricing = () => window.location.href = "/payments.html";

/* PANELS */
window.showPanel = function(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

/* CHAT */
function appendMsg(text, cls){
  const el=document.createElement('div');
  el.className='msg '+cls;
  el.innerText=text;
  document.getElementById('chat-messages').appendChild(el);
}

window.sendChat = async function(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg)return;

  input.value='';
  appendMsg(msg,'user');

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  appendMsg(data.reply || 'Error','bot');
}

/* FOLLOWUP */
window.generateFollowUp = async function(){
  const name=document.getElementById('lead-name').value;

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:`Write a real estate follow-up for ${name}`,
      type:'followup'
    })
  });

  const data=await res.json();
  document.getElementById('email-content').innerText=data.reply;
}

/* LISTING */
window.generateListing = async function(){
  const address=document.getElementById('prop-address').value;

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:`Create MLS listing for ${address}`,
      type:'listing'
    })
  });

  const data=await res.json();
  document.getElementById('listing-content').innerText=data.reply;
}

/* SUCCESS MESSAGE */
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);

  if (params.get("success")) {
    alert("Payment successful 🎉");
  }
});
</script>

</body>
</html>
