<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL STYLES EXACTLY */
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  margin: 0;
}

/* NAV */
nav {
  background: var(--navy);
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.logout-btn {
  background: var(--gold);
  border: none;
  padding: 6px 12px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

/* TABS */
.nav-tabs {
  display: flex;
  gap: 10px;
  background: var(--navy);
  padding: 10px;
}

.nav-tab {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  padding: 8px 14px;
}

.nav-tab.active {
  background: var(--gold);
  color: black;
  border-radius: 6px;
}

/* PANELS */
.panel {
  display: none;
  padding: 20px;
}
.panel.active {
  display: block;
}
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</nav>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPanel('tools')">Chat</button>
  <button class="nav-tab" onclick="showPanel('followup')">Follow-Up</button>
  <button class="nav-tab" onclick="showPanel('listing')">Listings</button>
  <button class="nav-tab" onclick="showPanel('booking')">Booking</button>
</div>

<!-- CHAT -->
<div id="panel-tools" class="panel active">
  <h2>AI Chat</h2>
  <div id="chat-messages" style="height:300px;overflow:auto;background:white;padding:10px;"></div>
  <input id="chat-input" placeholder="Ask something..." style="width:100%;margin-top:10px;">
  <button onclick="sendChat()">Send</button>
</div>

<!-- FOLLOW-UP -->
<div id="panel-followup" class="panel">
  <h2>Follow-Up Generator</h2>
  <input id="lead-name" placeholder="Name">
  <textarea id="lead-notes" placeholder="Notes"></textarea>
  <button onclick="generateFollowUp()">Generate</button>

  <div id="email-result" style="margin-top:10px;">
    <h4>Email</h4>
    <div id="email-content"></div>
  </div>

  <div id="sms-result">
    <h4>SMS</h4>
    <div id="sms-content"></div>
  </div>
</div>

<!-- LISTINGS -->
<div id="panel-listing" class="panel">
  <h2>Listing Generator</h2>
  <input id="prop-address" placeholder="Address">
  <input id="prop-price" placeholder="Price">
  <textarea id="prop-features" placeholder="Features"></textarea>
  <button id="listing-btn" onclick="generateListing()">Generate</button>

  <div id="listing-result">
    <pre id="listing-content"></pre>
  </div>
</div>

<!-- BOOKING -->
<div id="panel-booking" class="panel">
  <h2>Book Showing</h2>
  <input id="booking-email" placeholder="Client Email">
  <input id="booking-time" type="datetime-local">
  <button onclick="bookNow()">Book</button>
</div>

<!-- YOUR ORIGINAL SCRIPT -->
<script src="script.js"></script>

<!-- 🔒 LOGIN PROTECTION + LOGOUT -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// PROTECT PAGE
const { data: { session } } = await supabase.auth.getSession();

if (!session) {
  window.location.href = "/src/login.html";
}

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

// BOOKING CONNECTED TO YOUR FUNCTION
window.bookNow = async () => {
  const email = document.getElementById("booking-email").value;
  const time = document.getElementById("booking-time").value;

  const res = await fetch("/.netlify/functions/booking", {
    method: "POST",
    body: JSON.stringify({
      email,
      startTime: time,
      endTime: time
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
};
</script>

</body>
</html>
