<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL STYLES EXACTLY */
:root {
  --gold:#C9A84C; --navy:#0D1B2A; --cream:#FAF8F3;
}
body { font-family:'DM Sans',sans-serif; background:var(--cream); margin:0; }
nav { background:var(--navy); color:white; padding:16px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:'Playfair Display',serif; color:var(--gold); font-size:22px; }
.nav-tabs button { background:none; border:none; color:#aaa; margin-left:10px; cursor:pointer; }
.nav-tabs button.active { color:var(--gold); }
.panel { display:none; padding:20px; }
.panel.active { display:block; }
.chat-box { border:1px solid #ddd; height:300px; overflow:auto; padding:10px; background:white; }
.msg { margin-bottom:10px; }
.msg.user { text-align:right; }
.msg.bot { text-align:left; }
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>
  <div class="nav-tabs">
    <button onclick="showPanel('tools')" class="active">Tools</button>
    <button onclick="showPanel('followup')">Follow-Up</button>
    <button onclick="showPanel('listing')">Listings</button>
    <button onclick="showPanel('booking')">Booking</button>
    <button onclick="upgrade()">Upgrade</button>
    <button onclick="billing()">Billing</button>
  </div>
</nav>

<!-- TOOLS -->
<div id="panel-tools" class="panel active">
  <h2>Welcome to PropAI</h2>
</div>

<!-- FOLLOWUP -->
<div id="panel-followup" class="panel">
  <h3>Follow-Up Generator</h3>
  <input id="lead-name" placeholder="Name">
  <button onclick="generateFollowUp()">Generate</button>
  <pre id="email-content"></pre>
</div>

<!-- LISTING -->
<div id="panel-listing" class="panel">
  <h3>Listing Generator</h3>
  <input id="prop-address" placeholder="Address">
  <button onclick="generateListing()">Generate</button>
  <pre id="listing-content"></pre>
</div>

<!-- BOOKING / CHAT -->
<div id="panel-booking" class="panel">
  <h3>AI Chat</h3>
  <div id="chat-messages" class="chat-box"></div>
  <input id="chat-input" placeholder="Type..." onkeydown="if(event.key==='Enter')sendChat()">
  <button onclick="sendChat()">Send</button>
</div>

<script>

/* NAV */
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

/* CHAT */
function appendMsg(text, cls){
  const el=document.createElement('div');
  el.className='msg '+cls;
  el.innerText=text;
  document.getElementById('chat-messages').appendChild(el);
}

async function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value.trim();
  if(!msg)return;

  input.value='';
  appendMsg(msg,'user');

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg})
  });

  const data=await res.json();
  appendMsg(data.reply || 'Error','bot');
}

/* LISTING */
async function generateListing(){
  const address=document.getElementById('prop-address').value;

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:`Create listing for ${address}`,
      type:'listing'
    })
  });

  const data=await res.json();
  document.getElementById('listing-content').innerText=data.reply;
}

/* FOLLOWUP */
async function generateFollowUp(){
  const name=document.getElementById('lead-name').value;

  const res=await fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      message:`Follow up with ${name}`,
      type:'followup'
    })
  });

  const data=await res.json();
  document.getElementById('email-content').innerText=data.reply;
}

/* STRIPE */
async function upgrade(){
  const res=await fetch('/.netlify/functions/createCheckout',{method:'POST'});
  const data=await res.json();
  window.location=data.url;
}

async function billing(){
  const res=await fetch('/.netlify/functions/createPortal',{method:'POST'});
  const data=await res.json();
  window.location=data.url;
}

</script>

</body>
</html>
