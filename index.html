<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* === YOUR ORIGINAL STYLES UNCHANGED === */
:root {
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #8B6914;
  --navy: #0D1B2A;
  --navy-mid: #1B2D42;
  --navy-light: #243550;
  --cream: #FAF8F3;
  --text: #1a1a2e;
  --white: #ffffff;
  --radius: 12px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  margin: 0;
}

/* NAV */
nav {
  background: var(--navy);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 22px;
}
.logo span { color: white; }

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-tab {
  background: none;
  border: none;
  color: #8899AA;
  padding: 8px 14px;
  cursor: pointer;
}

.nav-tab.active { color: var(--gold); }

/* NEW BILLING BUTTONS */
.nav-btn {
  background: var(--gold);
  color: var(--navy);
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

.nav-btn.secondary {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
}

/* KEEP REST OF YOUR STYLES... */
</style>
</head>

<body>

<nav>
  <div class="logo">Prop<span>AI</span></div>

  <div class="nav-right">
    <button class="nav-tab active" onclick="showPanel('tools')">Tools</button>
    <button class="nav-tab" onclick="showPanel('followup')">Follow-Up</button>
    <button class="nav-tab" onclick="showPanel('listing')">Listings</button>
    <button class="nav-tab" onclick="showPanel('booking')">Booking</button>

    <!-- ✅ BILLING BUTTONS -->
    <button class="nav-btn" onclick="startCheckout()">Upgrade</button>
    <button class="nav-btn secondary" onclick="openBilling()">Billing</button>
  </div>
</nav>

<main>
  <!-- KEEP YOUR ENTIRE ORIGINAL CONTENT BELOW -->
</main>

<!-- ✅ YOUR WORKING SCRIPT -->
<script src="script.js"></script>

<!-- ✅ STRIPE + BILLING HANDLERS -->
<script>
async function startCheckout() {
  try {
    const res = await fetch('/.netlify/functions/createCheckout', {
      method: 'POST'
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert('Checkout failed');
    }

  } catch (err) {
    alert(err.message);
  }
}

async function openBilling() {
  try {
    const res = await fetch('/.netlify/functions/createPortal', {
      method: 'POST'
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert('Billing failed');
    }

  } catch (err) {
    alert(err.message);
  }
}
</script>

</body>
</html>
