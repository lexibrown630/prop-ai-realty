<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* NAV */
nav {
  background: #0D1B2A;
  color: white;
  padding: 15px;
  display: flex;
  gap: 10px;
}

.nav-tab {
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 5px;
}

.nav-tab.active {
  background: #C9A84C;
  color: black;
}

/* PANELS */
.panel {
  display: none;
  padding: 20px;
}

.panel.active {
  display: block;
}

/* CHAT */
#chat-messages {
  height: 300px;
  overflow-y: auto;
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.msg {
  margin-bottom: 10px;
}

.user {
  text-align: right;
}

.bot {
  text-align: left;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  background: #C9A84C;
  border: none;
  cursor: pointer;
  width: 100%;
}

/* RESULT BOXES */
.result {
  background: white;
  padding: 15px;
  border-radius: 8px;
  margin-top: 15px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-tab active" onclick="showPanel('tools')">Chat</div>
  <div class="nav-tab" onclick="showPanel('followup')">Follow-Up</div>
  <div class="nav-tab" onclick="showPanel('listing')">Listings</div>
  <div class="nav-tab" onclick="showPanel('booking')">Booking</div>
</nav>

<!-- ================= CHAT ================= -->
<div id="panel-tools" class="panel active">
  <h2>AI Assistant</h2>

  <div id="chat-messages"></div>

  <input id="chat-input" placeholder="Ask about properties or book a showing..." />
  <button onclick="sendChat()">Send</button>
</div>

<!-- ================= FOLLOW-UP ================= -->
<div id="panel-followup" class="panel">
  <h2>Follow-Up Generator</h2>

  <input id="lead-name" placeholder="Client Name">
  <input id="lead-contact" placeholder="Email or Phone">
  <input id="lead-source" placeholder="Lead Source (Zillow, Website)">
  <input id="lead-type" placeholder="Buyer / Seller">
  <textarea id="lead-notes" placeholder="Notes"></textarea>

  <button id="followup-btn" onclick="generateFollowUp()">Generate Follow-Up</button>

  <div class="result">
    <strong>Email:</strong>
    <div id="email-content"></div>
  </div>

  <div class="result">
    <strong>SMS:</strong>
    <div id="sms-content"></div>
  </div>
</div>

<!-- ================= LISTINGS ================= -->
<div id="panel-listing" class="panel">
  <h2>Listing Generator</h2>

  <input id="prop-address" placeholder="Address">
  <input id="prop-beds" placeholder="Beds/Baths">
  <input id="prop-sqft" placeholder="Square Feet">
  <input id="prop-price" placeholder="Price">
  <input id="prop-year" placeholder="Year Built">
  <input id="prop-features" placeholder="Key Features">
  <input id="prop-tone" placeholder="Tone (Luxury, Casual, etc)">

  <button id="listing-btn" onclick="generateListing()">Generate Listing</button>

  <div class="result">
    <div id="listing-content"></div>
  </div>
</div>

<!-- ================= BOOKING ================= -->
<div id="panel-booking" class="panel">
  <h2>Book a Showing</h2>

  <button onclick="getSlots()">Get Available Times</button>

  <div id="slots" style="margin-top:15px;"></div>
</div>

<!-- ================= CONNECT SCRIPT ================= -->
<script src="/script.js"></script>

<script>
/* ================= BOOKING ================= */

async function getSlots() {
  const res = await fetch('/.netlify/functions/booking', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: "suggest" })
  });

  const data = await res.json();
  const container = document.getElementById('slots');
  container.innerHTML = "";

  if (!data.suggestions) {
    container.innerText = "No availability found";
    return;
  }

  data.suggestions.forEach(slot => {
    const btn = document.createElement('button');
    const time = new Date(slot.start).toLocaleString();

    btn.innerText = time;

    btn.onclick = async () => {
      await fetch('/.netlify/functions/booking', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: "book",
          startTime: slot.start,
          endTime: slot.end,
          title: "Property Showing",
          email: "test@test.com" // can replace later
        })
      });

      alert("Booking confirmed");
    };

    container.appendChild(btn);
  });
}
</script>

</body>
</html>
