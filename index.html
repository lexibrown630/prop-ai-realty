<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* --- KEEPING YOUR ORIGINAL STYLES EXACT --- */
:root {
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #8B6914;
  --navy: #0D1B2A;
  --navy-mid: #1B2D42;
  --navy-light: #243550;
  --cream: #FAF8F3;
  --cream-dark: #F0EBE0;
  --text: #1a1a2e;
  --text-muted: #6B7080;
  --success: #2D7A4F;
  --success-bg: #E8F5EE;
  --white: #ffffff;
  --radius: 12px;
  --radius-lg: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
}

nav {
  background: var(--navy);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 22px;
}
.logo span { color: white; }

.nav-tabs { display: flex; gap: 6px; }

.nav-tab {
  background: none;
  border: none;
  color: #8899AA;
  padding: 8px 14px;
  cursor: pointer;
  border-radius: 8px;
}

.nav-tab.active {
  color: var(--gold);
  background: rgba(201,168,76,0.15);
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 2rem;
}

.hero {
  background: var(--navy);
  border-radius: 20px;
  padding: 2.5rem;
  color: white;
  margin-bottom: 2rem;
}

.panel { display: none; }
.panel.active { display: block; }

.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap: 1.5rem;
}

.tool-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #E8E4DA;
  padding: 1.5rem;
}

.btn-primary, .btn-gold {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: var(--navy);
  color: white;
}

.btn-gold {
  background: var(--gold);
  color: var(--navy);
}

.result-box {
  display: none;
  margin-top: 10px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 8px;
}

.result-box.visible { display: block; }

.chat-messages {
  height: 300px;
  overflow-y: auto;
  background: #f5f5f5;
  padding: 10px;
  border-radius: 10px;
}

.msg {
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
}

.msg.bot { background: white; }
.msg.user { background: var(--navy); color: white; }

.success-banner {
  display: none;
  margin-top: 10px;
  padding: 10px;
  background: #E8F5EE;
  border-radius: 8px;
}

.success-banner.visible { display: block; }

.slot-btn {
  padding: 6px;
  border: 1px solid #ccc;
  cursor: pointer;
  margin: 4px;
}

.slot-btn.selected {
  background: var(--gold);
}
</style>
</head>

<body>

<nav>
  <div class="logo">Prop<span>AI</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPanel('tools')">Tools</button>
    <button class="nav-tab" onclick="showPanel('followup')">Lead Follow-Up</button>
    <button class="nav-tab" onclick="showPanel('listing')">Listings</button>
    <button class="nav-tab" onclick="showPanel('booking')">Booking</button>
  </div>
</nav>

<main>

<div class="hero">
  <h1>AI automation for real estate</h1>
  <p>Lead follow-up, listings, and booking — all in one place.</p>
</div>

<div id="panel-tools" class="panel active">
  <div class="tool-grid">
    <div class="tool-card" onclick="showPanel('followup')">Follow-Up Tool</div>
    <div class="tool-card" onclick="showPanel('listing')">Listing Tool</div>
    <div class="tool-card" onclick="showPanel('booking')">Booking Tool</div>
  </div>
</div>

<div id="panel-followup" class="panel">
  <button class="btn-primary" onclick="generateFollowUp()">Generate</button>
  <div id="email-result" class="result-box"></div>
  <div id="sms-result" class="result-box"></div>
</div>

<div id="panel-listing" class="panel">
  <button class="btn-primary" onclick="generateListing()">Generate</button>
  <div id="listing-result" class="result-box"></div>
</div>

<div id="panel-booking" class="panel">
  <div class="chat-messages" id="chat"></div>
  <input id="chat-input">
  <button onclick="sendChat()">Send</button>
</div>

</main>

<script>
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

function generateFollowUp(){
  document.getElementById('email-result').innerText="Sample email generated";
  document.getElementById('sms-result').innerText="Sample SMS generated";
  document.getElementById('email-result').classList.add('visible');
  document.getElementById('sms-result').classList.add('visible');
}

function generateListing(){
  document.getElementById('listing-result').innerText="Sample listing description";
  document.getElementById('listing-result').classList.add('visible');
}

function sendChat(){
  const input=document.getElementById('chat-input');
  const msg=input.value;
  if(!msg)return;
  input.value="";
  const div=document.createElement('div');
  div.className='msg user';
  div.innerText=msg;
  document.getElementById('chat').appendChild(div);

  const reply=document.createElement('div');
  reply.className='msg bot';
  reply.innerText="Got it — let's book a showing.";
  document.getElementById('chat').appendChild(reply);
}
</script>

</body>
</html>
