<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI — Real Estate Automation Platform</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- SUPABASE -->
<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// ======================
// AUTH + PAYWALL CHECK
// ======================
async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  // NOT LOGGED IN → LOGIN PAGE
  if (!session) {
    window.location.href = "/src/login.html";
    return;
  }

  const email = session.user.email;

  // CHECK SUBSCRIPTION STATUS
  const { data } = await supabase
    .from("users")
    .select("subscription_status")
    .eq("email", email)
    .single();

  if (!data || data.subscription_status !== "active") {
    // NOT PAID → PAYMENT PAGE
    window.location.href = "/src/payments.html";
    return;
  }

  // USER IS ACTIVE
  console.log("User authenticated + active subscription");
}

checkAccess();
</script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",

  await supabase.auth.signOut();
