<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI — Real Estate Automation Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#C9A84C;
  --navy:#0D1B2A;
  --cream:#FAF8F3;
  --text:#1a1a2e;
  --text-muted:#6B7080;
  --white:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
}

/* NAV */
nav{
  background:var(--navy);
  padding:0 2rem;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  font-family:'Playfair Display';
  color:var(--gold);
  font-size:22px;
}
.logo span{color:#fff;}

.nav-tab{
  background:none;
  border:none;
  color:#8899AA;
  padding:8px 16px;
  cursor:pointer;
}
.nav-tab.active{color:var(--gold);}

/* MAIN WIDTH FIX */
main{
  max-width:1400px;   /* 🔥 wider */
  margin:auto;
  padding:2rem;
}

/* GRID */
.grid{
  display:grid;
  gap:20px;
}

/* DASHBOARD */
.dashboard{
  background:#fff;
  padding:20px;
  border-radius:14px;
  border:1px solid #E8E4DA;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-top:15px;
}

.stat{
  font-size:22px;
  font-weight:600;
}

.stat-label{
  font-size:12px;
  color:var(--text-muted);
}

/* CARD */
.card{
  background:#fff;
  border-radius:14px;
  border:1px solid #E8E4DA;
  overflow:hidden;
}

.card-header{
  background:var(--navy);
  color:#fff;
  padding:14px 18px;
}

.card-body{
  padding:18px;
}

/* FORM */
input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--navy);
  color:#fff;
  cursor:pointer;
}

/* TWO COLUMN FIX */
.two-col{
  display:grid;
  grid-template-columns:1.2fr 0.8fr; /* 🔥 balanced */
  gap:20px;
}

/* OUTPUT FIX */
.output{
  max-width:520px;   /* 🔥 prevents long ugly text */
  line-height:1.6;
  font-size:14px;
}

/* LEADS LIST */
.leads{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
  font-size:13px;
  color:var(--text-muted);
}

/* MOBILE */
@media(max-width:900px){
  .two-col{
    grid-template-columns:1fr;
  }
  .stats{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">Prop<span>AI</span></div>
  <div>
    <button class="nav-tab active" onclick="showPanel('followup')">Follow-Up</button>
    <button class="nav-tab" onclick="showPanel('listing')">Listings</button>
  </div>
</nav>

<main>

<!-- DASHBOARD -->
<div class="dashboard">
  <div style="font-weight:600;">Lead follow-up dashboard</div>
  <div id="dashboard-date" style="font-size:13px;color:#6B7080;margin-top:4px;"></div>

  <div class="stats">
    <div><div class="stat" id="stat-total">0</div><div class="stat-label">Total leads</div></div>
    <div><div class="stat" id="stat-hot">0</div><div class="stat-label">Hot leads</div></div>
    <div><div class="stat" id="stat-followup">0</div><div class="stat-label">Need follow-up</div></div>
    <div><div class="stat" id="stat-week">0</div><div class="stat-label">This week</div></div>
  </div>
</div>

<!-- MAIN GRID -->
<div class="two-col" style="margin-top:20px;">

<!-- LEFT: FORM -->
<div class="card">
  <div class="card-header">New Lead</div>
  <div class="card-body">

    <input id="lead-name" placeholder="Name">
    <input id="lead-contact" placeholder="Email or phone">

    <select id="lead-source">
      <option>Zillow</option>
      <option>Facebook</option>
      <option>Referral</option>
    </select>

    <select id="lead-type">
      <option>Buying</option>
      <option>Selling</option>
    </select>

    <textarea id="lead-notes" placeholder="Notes"></textarea>

    <button onclick="generateFollowUp()">Generate</button>

  </div>
</div>

<!-- RIGHT: OUTPUT -->
<div class="grid">

  <div class="card">
    <div class="card-header">Email</div>
    <div class="card-body output" id="email-content"></div>
  </div>

  <div class="card">
    <div class="card-header">SMS</div>
    <div class="card-body output" id="sms-content"></div>
  </div>

  <div class="card">
    <div class="card-header">Saved Leads</div>
    <div class="card-body leads" id="leads-list">
      No leads yet
    </div>
  </div>

</div>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
