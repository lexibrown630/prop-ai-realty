<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
}

/* NAV */
nav {
  background: var(--navy);
  padding: 16px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.logout {
  background: var(--gold);
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  background: var(--navy);
  color: white;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.plan {
  display: inline-block;
  background: var(--gold);
  color: black;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

/* DASHBOARD */
.dashboard {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.card h3 {
  margin-top: 0;
}

.card button {
  margin-top: 10px;
  padding: 8px 12px;
  background: var(--gold);
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>
  <button class="logout" onclick="logout()">Logout</button>
</nav>

<div class="hero">
  <h1>Your AI Real Estate Dashboard</h1>
  <p id="planText">Loading...</p>
</div>

<div class="dashboard">
  <div id="features" class="grid"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    window.location.href = "/src/login.html";
    return;
  }

  const email = session.user.email;

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", email);

  const user = data && data[0];

  if (!user || user.subscription_status !== "active") {
    window.location.href = "/src/payments.html";
    return;
  }

  document.getElementById("planText").innerHTML =
    "Current Plan: <span class='plan'>" + user.plan.toUpperCase() + "</span>";

  renderFeatures(user.plan);
}

// 🔥 REAL DASHBOARD FEEL
function renderFeatures(plan) {
  const el = document.getElementById("features");

  if (plan === "starter") {
    el.innerHTML = `
      <div class="card">
        <h3>Leads</h3>
        <p>Basic lead tracking system</p>
        <button onclick="alert('Leads feature coming soon')">Open</button>
      </div>

      <div class="card">
        <h3>Scheduling</h3>
        <p>Simple booking system</p>
        <button onclick="alert('Calendar coming soon')">Open</button>
      </div>
    `;
  }

  if (plan === "pro") {
    el.innerHTML = `
      <div class="card">
        <h3>AI Follow-Up</h3>
        <p>Automated responses</p>
        <button onclick="alert('AI coming soon')">Launch</button>
      </div>

      <div class="card">
        <h3>Smart Scheduling</h3>
        <p>Advanced calendar</p>
        <button onclick="alert('Scheduler coming soon')">Open</button>
      </div>

      <div class="card">
        <h3>Listings</h3>
        <p>AI listing generator</p>
        <button onclick="alert('Listings coming soon')">Create</button>
      </div>
    `;
  }

  if (plan === "agency") {
    el.innerHTML = `
      <div class="card">
        <h3>Full AI Suite</h3>
        <p>Everything unlocked</p>
      </div>

      <div class="card">
        <h3>Multi-Agent</h3>
        <p>Team management</p>
      </div>

      <div class="card">
        <h3>Automation</h3>
        <p>Advanced workflows</p>
      </div>

      <div class="card">
        <h3>White Label</h3>
        <p>Custom branding</p>
      </div>
    `;
  }
}

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

checkAccess();
</script>

</body>
</html>
