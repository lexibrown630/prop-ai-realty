<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PropAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #C9A84C;
  --navy: #0D1B2A;
  --cream: #FAF8F3;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
}

nav {
  background: var(--navy);
  padding: 16px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-family: 'Playfair Display', serif;
  font-size: 22px;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.btn {
  background: var(--gold);
  border: none;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: bold;
  border-radius: 6px;
}

.hero {
  background: var(--navy);
  color: white;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
}

.plan {
  display: inline-block;
  background: var(--gold);
  color: black;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

.dashboard {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}
</style>
</head>

<body>

<nav>
  <div class="logo">PropAI</div>

  <div class="nav-buttons">
    <button id="upgradeBtn" class="btn" onclick="goToBilling()">Upgrade</button>
    <button id="manageBtn" class="btn" onclick="manageSubscription()" style="display:none;">Manage</button>
    <button class="btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="hero">
  <h1>Your AI Real Estate Dashboard</h1>
  <p id="planText">Loading...</p>
</div>

<div class="dashboard">
  <div id="features" class="grid"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_1YMQSjBmwLytMgeewMHxPQ_guXEPe3v"
);

// 🚀 PAGE ACCESS CHECK
async function checkAccess() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    window.location.href = "/src/login.html";
    return;
  }

  const email = session.user.email;

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", email);

  const user = data && data[0];

  if (!user) {
    window.location.href = "/src/payments.html";
    return;
  }

  // BUTTON TOGGLE
  const upgradeBtn = document.getElementById("upgradeBtn");
  const manageBtn = document.getElementById("manageBtn");

  if (user.subscription_status === "active") {
    upgradeBtn.style.display = "none";
    manageBtn.style.display = "inline-block";
  } else {
    manageBtn.style.display = "none";
    window.location.href = "/src/payments.html";
    return;
  }

  document.getElementById("planText").innerHTML =
    "Current Plan: <span class='plan'>" + user.plan.toUpperCase() + "</span>";

  renderFeatures(user.plan);
}

// 🔥 CLICKABLE FEATURES
function renderFeatures(plan) {
  const el = document.getElementById("features");

  if (plan === "starter") {
    el.innerHTML = `
      <div class="card" onclick="goTo('/src/leads.html')">
        <h3>Leads</h3>
      </div>

      <div class="card" onclick="goTo('/src/calendar.html')">
        <h3>Scheduling</h3>
      </div>
    `;
  }

  if (plan === "pro") {
    el.innerHTML = `
      <div class="card" onclick="goTo('/src/ai.html')">
        <h3>AI Follow-Up</h3>
      </div>

      <div class="card" onclick="goTo('/src/calendar.html')">
        <h3>Smart Scheduling</h3>
      </div>

      <div class="card" onclick="goTo('/src/listings.html')">
        <h3>Listings</h3>
      </div>
    `;
  }

  if (plan === "agency") {
    el.innerHTML = `
      <div class="card" onclick="goTo('/src/ai.html')">
        <h3>AI Suite</h3>
      </div>

      <div class="card" onclick="goTo('/src/calendar.html')">
        <h3>Scheduling</h3>
      </div>

      <div class="card" onclick="goTo('/src/listings.html')">
        <h3>Automation</h3>
      </div>

      <div class="card" onclick="goTo('/src/leads.html')">
        <h3>CRM</h3>
      </div>
    `;
  }
}

// 🔗 NAVIGATION
window.goTo = (path) => {
  window.location.href = path;
};

// BILLING
window.goToBilling = () => {
  window.location.href = "/src/payments.html";
};

// STRIPE PORTAL
window.manageSubscription = async () => {
  const { data: { session } } = await supabase.auth.getSession();

  const res = await fetch("/.netlify/functions/createPortal", {
    method: "POST",
    body: JSON.stringify({ email: session.user.email }),
  });

  const data = await res.json();

  if (data.url) {
    window.location.href = data.url;
  } else {
    alert("Error opening portal");
  }
};

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  window.location.href = "/src/login.html";
};

checkAccess();
</script>

</body>
</html>
