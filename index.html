<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:#1f2937;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#6366f1;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#020617,#0b0f1a);
  color:var(--text);
}

.app{display:flex;height:100vh;}

.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.nav-item{
  padding:10px;
  cursor:pointer;
  color:var(--muted);
}
.nav-item.active{color:white;}

.main{flex:1;padding:30px;}

.page{display:none;}
.page.active{display:block;}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.btn{
  background:var(--accent);
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

input,select{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#020617;
  border:none;
  color:white;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="app">

<div class="sidebar">
  <div>
    <div class="nav-item active" onclick="nav(this,'dashboard')">Dashboard</div>
    <div class="nav-item" onclick="nav(this,'followup')">Follow-Up</div>
    <div class="nav-item" onclick="nav(this,'listing')">Listings</div>
    <div class="nav-item" onclick="nav(this,'chat')">Assistant</div>
  </div>

  <div>
    <div id="plan">Starter</div>
    <div style="font-size:12px;color:#94a3b8;">Fair use enabled</div>
    <button class="btn" onclick="openBilling()">Billing</button>
  </div>
</div>

<div class="main">

<div id="page-dashboard" class="page active">
  <h2>Dashboard</h2>

  <div class="card">
    <h3>Follow-Up</h3>
    <button class="btn" onclick="go('followup')">Open</button>
  </div>

  <div class="card">
    <h3>Listings</h3>
    <button class="btn" onclick="go('listing')">Open</button>
  </div>

  <div class="card">
    <h3>Assistant</h3>
    <button class="btn" onclick="go('chat')">Open</button>
  </div>
</div>

<!-- FOLLOW UP -->

<div id="page-followup" class="page">
  <h2>Follow-Up Generator</h2>

  <input id="lead" placeholder="Lead name">

  <select id="tone">
    <option>Friendly</option>
    <option>Professional</option>
    <option>Urgent</option>
  </select>

  <select id="goal">
    <option>Book a call</option>
    <option>Nurture relationship</option>
    <option>Close deal</option>
  </select>

<button class="btn" onclick="followUp()">Generate</button>

  <pre id="follow-output"></pre>

</div>

<!-- LISTING -->

<div id="page-listing" class="page">
  <h2>Listing Generator</h2>

  <input id="address" placeholder="Address">
  <input id="price" placeholder="Price">
  <input id="beds" placeholder="Bedrooms">

  <select id="propertyType">
    <option>House</option>
    <option>Condo</option>
    <option>Luxury Estate</option>
  </select>

  <select id="listingTone">
    <option>Luxury</option>
    <option>Casual</option>
    <option>Investor-focused</option>
  </select>

<button class="btn" onclick="listing()">Generate</button>

  <pre id="listing-output"></pre>

</div>

<!-- CHAT -->

<div id="page-chat" class="page">
  <h2>Assistant</h2>
  <div id="chatbox"></div>
  <input id="msg" placeholder="Message..." onkeydown="if(event.key==='Enter')chat()">
  <button class="btn" onclick="chat()">Send</button>
</div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient("https://jrmqdojsxjtkjpczaysp.supabase.co","sb_publishable_...");

/* AUTH */
const {data}=await supabase.auth.getSession();
if(!data.session) location.href="/login.html";

/* LOAD USER */
const user=await supabase.from("users").select("*").eq("id",data.session.user.id).single();
let plan=user.data?.plan||"starter";
document.getElementById("plan").innerText=plan.toUpperCase();

/* NAV */
function nav(el,p){
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  go(p);
}
function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById("page-"+p).classList.add("active");
}

/* API */
async function api(body){
  const {data:{session}}=await supabase.auth.getSession();
  return fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${session.access_token}`
    },
    body:JSON.stringify(body)
  });
}

/* FOLLOW UP */
async function followUp(){
  const name=document.getElementById("lead").value;
  const tone=document.getElementById("tone").value;
  const goal=document.getElementById("goal").value;

  const res=await api({
    message:`Write a ${tone} real estate follow-up to ${name} with the goal to ${goal}`,
    type:"followup"
  });

  const data=await res.json();
  document.getElementById("follow-output").innerText=data.reply;
}

/* LISTING */
async function listing(){
  if(plan==="starter") return alert("Upgrade required");

  const addr=document.getElementById("address").value;
  const price=document.getElementById("price").value;
  const beds=document.getElementById("beds").value;
  const type=document.getElementById("propertyType").value;
  const tone=document.getElementById("listingTone").value;

  const res=await api({
    message:`Create a ${tone} listing for a ${type} at ${addr}, priced at ${price}, ${beds} bedrooms`,
    type:"listing"
  });

  const data=await res.json();
  document.getElementById("listing-output").innerText=data.reply;
}

/* CHAT */
async function chat(){
  const msg=document.getElementById("msg").value;

  const res=await api({message:msg});
  const data=await res.json();

  const el=document.createElement("div");
  el.innerText=data.reply;
  document.getElementById("chatbox").appendChild(el);
}

/* BILLING */
async function openBilling(){
  const {data:{session}}=await supabase.auth.getSession();

  const res=await fetch('/.netlify/functions/stripe-portal',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:session.user.email})
  });

  location.href=(await res.json()).url;
}

/* expose for buttons */
window.nav=nav;
window.go=go;
window.followUp=followUp;
window.listing=listing;
window.chat=chat;
window.openBilling=openBilling;
</script>

</body>
</html>
