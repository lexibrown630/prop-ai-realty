<!-- 🔥 YOUR ORIGINAL CONTENT STARTS HERE -->

<!-- KEEP YOUR FULL ORIGINAL NAV / HERO / PANELS HERE -->

<!-- 🔥 ONLY CHANGE IS SCRIPT BELOW -->

<script>
/* 🚫 NO CLAUDE
   🚫 NO OPENAI
   ✅ UI SAFE
*/

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function generateFollowUp() {
  document.getElementById('email-result').classList.add('visible');
  document.getElementById('sms-result').classList.add('visible');
  document.getElementById('email-content').innerText = "AI temporarily disabled";
  document.getElementById('sms-content').innerText = "AI temporarily disabled";
}

function generateListing() {
  document.getElementById('listing-result').classList.add('visible');
  document.getElementById('listing-content').innerText = "AI temporarily disabled";
}

function sendChat() {
  const input = document.getElementById('chat-input');
  if (!input.value) return;
  appendMsg(input.value, 'user');
  input.value = '';
  setTimeout(()=>appendMsg("AI temporarily disabled", 'bot'), 400);
}

function appendMsg(text, cls) {
  const container = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerText = text;
  container.appendChild(el);
}

function selectSlot(btn) {
  btn.classList.add('selected');
  document.getElementById('booking-confirm').classList.add('visible');
}
</script>
