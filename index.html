<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropAI Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --card:#1f2937;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#6366f1;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.logo{
  font-weight:600;
  font-size:18px;
  margin-bottom:30px;
}

.nav-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--muted);
}
.nav-item:hover{
  background:#111827;
  color:white;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* BUTTON */
.btn{
  background:var(--accent);
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  color:white;
}

/* CHAT */
.chat{
  height:300px;
  overflow:auto;
  background:#020617;
  padding:10px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  border:none;
}

/* USAGE */
.usage{
  font-size:13px;
  color:var(--muted);
}
</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">
  <div>
    <div class="logo">PropAI</div>

```
<div class="nav-item" onclick="showPage('dashboard')">Dashboard</div>
<div class="nav-item" onclick="showPage('followup')">Follow-Up</div>
<div class="nav-item" onclick="showPage('listing')">Listings</div>
<div class="nav-item" onclick="showPage('chat')">Assistant</div>
```

  </div>

  <div>
    <div id="plan">Starter Plan</div>
    <div class="usage" id="usage">0/10 used</div>
    <button class="btn" onclick="openBilling()">Billing</button>
  </div>
</div>

<!-- MAIN -->

<div class="main">

  <!-- DASHBOARD -->

  <div id="page-dashboard">
    <div class="header">
      <h2>Dashboard</h2>
    </div>

```
<div class="grid">
  <div class="card">
    <h3>Generate Follow-Up</h3>
    <button class="btn" onclick="showPage('followup')">Open</button>
  </div>

  <div class="card">
    <h3>Create Listing</h3>
    <button class="btn" onclick="showPage('listing')">Open</button>
  </div>

  <div class="card">
    <h3>AI Assistant</h3>
    <button class="btn" onclick="showPage('chat')">Open</button>
  </div>
</div>
```

  </div>

  <!-- FOLLOWUP -->

  <div id="page-followup" style="display:none">
    <h2>Follow-Up Generator</h2>
    <input id="lead" placeholder="Lead name">
    <button class="btn" onclick="followUp()">Generate</button>
    <pre id="follow-output"></pre>
  </div>

  <!-- LISTING -->

  <div id="page-listing" style="display:none">
    <h2>Listing Generator</h2>
    <input id="address" placeholder="Property address">
    <button class="btn" onclick="listing()">Generate</button>
    <pre id="listing-output"></pre>
  </div>

  <!-- CHAT -->

  <div id="page-chat" style="display:none">
    <h2>AI Assistant</h2>
    <div id="chatbox" class="chat"></div>
    <input id="msg" placeholder="Type..." onkeydown="if(event.key==='Enter')chat()">
    <button class="btn" onclick="chat()">Send</button>
  </div>

</div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase=createClient(
  "https://jrmqdojsxjtkjpczaysp.supabase.co",
  "sb_publishable_..."
);

let usage=0,limit=10,plan="starter";

/* AUTH */
const {data}=await supabase.auth.getSession();
if(!data.session) location.href="/login.html";

/* LOAD USER */
const user=await supabase.from("users")
  .select("*")
  .eq("id",data.session.user.id)
  .single();

if(user.data){
  usage=user.data.usage_count||0;
  plan=user.data.plan||"starter";
}

limit=plan==="starter"?10:plan==="pro"?100:999999;

document.getElementById("plan").innerText=plan.toUpperCase();
document.getElementById("usage").innerText=`${usage}/${limit}`;

/* NAV */
window.showPage=(p)=>{
  document.querySelectorAll("[id^=page-]").forEach(x=>x.style.display="none");
  document.getElementById("page-"+p).style.display="block";
};

/* FETCH */
async function api(body){
  const {data:{session}}=await supabase.auth.getSession();
  return fetch('/.netlify/functions/chat',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${session.access_token}`
    },
    body:JSON.stringify(body)
  });
}

/* CHAT */
window.chat=async()=>{
  if(usage>=limit) return alert("Limit reached");

  const msg=document.getElementById("msg").value;
  const res=await api({message:msg});
  const data=await res.json();

  document.getElementById("chatbox").innerHTML+=`<div>${data.reply}</div>`;
  usage++;
};

/* FOLLOWUP */
window.followUp=async()=>{
  if(usage>=limit) return alert("Limit reached");

  const name=document.getElementById("lead").value;
  const res=await api({message:`Follow up with ${name}`,type:"followup"});
  const data=await res.json();

  document.getElementById("follow-output").innerText=data.reply;
  usage++;
};

/* LISTING */
window.listing=async()=>{
  if(plan==="starter") return alert("Upgrade required");
  if(usage>=limit) return alert("Limit reached");

  const address=document.getElementById("address").value;
  const res=await api({message:`Listing for ${address}`,type:"listing"});
  const data=await res.json();

  document.getElementById("listing-output").innerText=data.reply;
  usage++;
};

/* BILLING */
window.openBilling=async()=>{
  const res=await fetch('/.netlify/functions/stripe-portal',{method:'POST'});
  const data=await res.json();
  location.href=data.url;
};
</script>

</body>
</html>
